
<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
:root{--c1:#00ff88;--c2:#00cfff;--c3:#ffaa00;--c4:#cc44ff;--bg:#000;--bg2:rgba(2,8,2,0.96);--border:rgba(0,255,136,0.2);--glow:rgba(0,255,136,0.12)}
.theme-cyber{--c1:#00cfff;--c2:#0088ff;--c3:#00ffee;--c4:#7700ff;--bg:#000510;--bg2:rgba(0,5,20,0.96);--border:rgba(0,207,255,0.2);--glow:rgba(0,207,255,0.12)}
.theme-neon{--c1:#ff00aa;--c2:#ff6600;--c3:#ffff00;--c4:#aa00ff;--bg:#0a000a;--bg2:rgba(15,0,15,0.96);--border:rgba(255,0,170,0.2);--glow:rgba(255,0,170,0.12)}
.theme-amber{--c1:#ffaa00;--c2:#ff6600;--c3:#ffdd00;--c4:#ff3300;--bg:#080400;--bg2:rgba(12,6,0,0.96);--border:rgba(255,170,0,0.2);--glow:rgba(255,170,0,0.12)}

#os{width:100%;height:640px;background:var(--bg);position:relative;overflow:hidden;border-radius:12px;font-family:'JetBrains Mono','Courier New',monospace;transition:background .5s}

/* BOOT */
#boot{position:absolute;inset:0;background:#000;z-index:100;display:flex;flex-direction:column;justify-content:center;align-items:center}
.boot-logo{font-size:10px;color:var(--c1);line-height:1.2;text-align:center;text-shadow:0 0 20px var(--c1);margin-bottom:20px;white-space:pre}
.boot-bar-wrap{width:280px;height:2px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.2);overflow:hidden;margin:12px 0}
.boot-bar{height:100%;width:0;background:var(--c1);box-shadow:0 0 10px var(--c1);transition:width .08s}
.boot-line{font-size:10px;color:rgba(0,255,136,.4);letter-spacing:2px;min-height:14px;margin-top:4px}
#boot-enter{display:none;margin-top:20px;font-size:11px;color:var(--c1);letter-spacing:4px;animation:bl 1.2s step-end infinite;cursor:pointer}
@keyframes bl{50%{opacity:0}}

/* DESKTOP */
#desktop{position:absolute;inset:0;display:none;flex-direction:column}
#taskbar{height:36px;background:rgba(0,0,0,0.92);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;backdrop-filter:blur(10px);z-index:6}
#tb-logo{font-size:10px;color:var(--c1);letter-spacing:3px;text-shadow:0 0 10px var(--c1)}
.tb-div{width:1px;height:18px;background:var(--border)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:6px}
#tb-clk{font-size:9px;color:var(--c2);letter-spacing:2px}
.tb-btn{font-size:8px;color:var(--c1);opacity:.5;cursor:pointer;border:1px solid var(--border);padding:2px 7px;transition:all .2s;letter-spacing:1px;background:transparent;font-family:inherit}
.tb-btn:hover{opacity:1;box-shadow:0 0 8px var(--glow)}

#wallpaper{position:absolute;top:36px;left:0;right:0;bottom:40px}
#wallpaper canvas{position:absolute;inset:0;width:100%;height:100%}
#wp-label{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--c1);opacity:.2;letter-spacing:3px;pointer-events:none;z-index:2}

/* ── ICONS: two columns, centered ── */
#icons{
  position:absolute;top:36px;left:0;right:0;bottom:40px;
  z-index:3;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.icon-grid{
  display:grid;
  grid-template-columns:repeat(2,72px);
  grid-auto-rows:82px;
  gap:6px 10px;
  pointer-events:all;
}
.icon{width:72px;text-align:center;cursor:pointer;padding:8px 4px;border-radius:4px;transition:all .15s}
.icon:hover{background:var(--glow);box-shadow:0 0 12px var(--glow)}
.icon-img{font-size:22px;margin-bottom:5px}
.icon-label{font-size:8px;color:var(--c1);opacity:.8;letter-spacing:.5px;line-height:1.3;word-break:break-word}

#dock{position:absolute;bottom:0;left:0;right:0;height:40px;background:rgba(0,0,0,0.88);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;z-index:5;backdrop-filter:blur(10px)}
.dk-btn{padding:4px 12px;background:transparent;border:1px solid var(--border);color:var(--c1);font-family:inherit;font-size:8px;cursor:pointer;letter-spacing:2px;transition:all .2s;border-radius:2px;opacity:.6}
.dk-btn:hover{opacity:1;box-shadow:0 0 10px var(--glow)}

/* WINDOWS */
.win{position:absolute;background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;min-width:260px;min-height:180px;display:flex;flex-direction:column;backdrop-filter:blur(14px);box-shadow:0 0 40px var(--glow),0 20px 60px rgba(0,0,0,.8)}
.win-bar{height:30px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:8px;cursor:grab;flex-shrink:0;user-select:none}
.win-bar:active{cursor:grabbing}
.wd{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:filter .15s}
.wd:hover{filter:brightness(1.5)}
.wd.r{background:#ff5f57}.wd.y{background:#febc2e}.wd.g{background:#28c840}
.win-title{font-size:8px;color:var(--c1);opacity:.6;letter-spacing:2px;flex:1;text-align:center}
.win-body{flex:1;overflow:hidden}

/* CONTENT */
.vb{padding:15px;overflow-y:auto;height:100%;font-size:10.5px;line-height:1.8;color:var(--c1);opacity:.85}
.vb::-webkit-scrollbar{width:3px}
.vb::-webkit-scrollbar-thumb{background:var(--border)}
.vtitle{font-size:13px;color:var(--c1);font-weight:700;letter-spacing:2px;margin-bottom:3px;opacity:1}
.vsub{font-size:9px;color:var(--c2);letter-spacing:2px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);opacity:.8}
.vkey{color:var(--c2);font-size:9px;letter-spacing:2px;margin-bottom:5px;opacity:.9}
.vtag{display:inline-block;font-size:8px;padding:1px 6px;border:1px solid var(--border);color:var(--c1);margin:2px 2px 2px 0;opacity:.7}
.vlink{display:inline-block;font-size:9px;padding:4px 11px;border:1px solid var(--c2);color:var(--c2);text-decoration:none;margin:3px 3px 3px 0;transition:all .2s;letter-spacing:1px;font-family:inherit;opacity:.7}
.vlink:hover{opacity:1;box-shadow:0 0 10px var(--glow);border-color:var(--c1);color:var(--c1)}
.vlink.g{border-color:var(--c1);color:var(--c1)}
.vlink.p{border-color:var(--c4);color:var(--c4)}
.vlink.a{border-color:var(--c3);color:var(--c3)}
.srow{margin-bottom:9px}
.stop{display:flex;justify-content:space-between;font-size:9px;margin-bottom:3px}
.sbg{height:4px;background:rgba(255,255,255,.05);border:1px solid var(--border);overflow:hidden}
.sbar{height:100%;width:0%;transition:width 1.1s ease;box-shadow:0 0 5px var(--c1)}
.eblk{border-left:2px solid var(--c1);padding-left:12px;margin-bottom:14px}
.eco{font-size:12px;color:var(--c1);font-weight:700}
.erole{font-size:9px;color:var(--c2);margin:2px 0}
.edate{font-size:8px;color:var(--c3);opacity:.6}
.eli{font-size:10px;color:rgba(255,255,255,.35);padding-left:10px;position:relative;line-height:1.7}
.eli::before{content:'›';position:absolute;left:0;color:var(--c1);opacity:.4}
.pcard{border:1px solid var(--border);padding:13px;margin-bottom:12px;position:relative;transition:all .2s}
.pcard::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--c1)}
.pcard:hover{box-shadow:0 0 16px var(--glow)}
.pn{font-size:12px;color:var(--c1);font-weight:700;letter-spacing:1px;margin:4px 0 6px}
.pd{font-size:10px;color:rgba(255,255,255,.35);line-height:1.6;margin-bottom:8px}
.ccard{border:1px solid var(--border);padding:10px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.ccard:hover{box-shadow:0 0 12px var(--glow)}
.cname{color:var(--c4);font-size:11px;font-weight:700}
.cid{font-size:8px;color:var(--c4);opacity:.4;margin-top:2px;letter-spacing:2px}
.term-out{height:100%;overflow-y:auto;padding:11px;font-size:11px;line-height:1.75;color:var(--c1)}
.term-out::-webkit-scrollbar{width:3px}
.term-out::-webkit-scrollbar-thumb{background:var(--border)}
.trow{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap}
.tprompt{color:var(--c2);white-space:nowrap;flex-shrink:0;font-size:10px}
.tinput{background:transparent;border:none;outline:none;color:var(--c1);font-family:inherit;font-size:11px;flex:1;min-width:40px;caret-color:var(--c1)}
.fmtb{height:28px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.fmbtn{background:transparent;border:1px solid var(--border);color:var(--c1);font-size:8px;padding:1px 7px;cursor:pointer;font-family:inherit;opacity:.6;transition:all .2s}
.fmbtn:hover{opacity:1}
.fmgrid{display:grid;grid-template-columns:repeat(auto-fill,88px);gap:7px;padding:12px;overflow-y:auto;height:calc(100% - 28px)}
.fmitem{text-align:center;cursor:pointer;padding:7px 3px;border:1px solid transparent;border-radius:3px;transition:all .15s}
.fmitem:hover{background:var(--glow);border-color:var(--border)}
.fmicon{font-size:22px;margin-bottom:3px}
.fmname{font-size:8px;color:var(--c1);opacity:.7;word-break:break-word;line-height:1.3}
.cfrow{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);padding:7px 0}
.cflbl{font-size:9px;color:var(--c1);white-space:nowrap;min-width:78px}
.cfinp{background:transparent;border:none;outline:none;color:var(--c2);font-family:inherit;font-size:10px;flex:1;caret-color:var(--c1)}
.cfinp::placeholder{color:rgba(255,255,255,.1)}
.cfsend{margin-top:10px;padding:8px 22px;background:transparent;border:1px solid var(--c1);color:var(--c1);font-family:inherit;font-size:9px;cursor:pointer;letter-spacing:3px;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all .25s}
.cfsend:hover{box-shadow:0 0 14px var(--glow)}

/* THEME PANEL */
#tw-panel{position:absolute;top:44px;right:12px;width:220px;background:var(--bg2);border:1px solid var(--border);z-index:30;display:none;backdrop-filter:blur(12px);box-shadow:0 0 30px var(--glow)}
#tw-panel.show{display:block}
.twp-head{padding:8px 12px;border-bottom:1px solid var(--border);font-size:9px;color:var(--c1);letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
.twp-sec{padding:10px 12px;border-bottom:1px solid var(--border)}
.twp-label{font-size:8px;color:var(--c2);letter-spacing:2px;margin-bottom:7px;opacity:.7}
.tw-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.tw-opt{padding:6px 8px;border:1px solid var(--border);font-size:8px;color:var(--c1);cursor:pointer;transition:all .2s;text-align:center;letter-spacing:1px;opacity:.6;font-family:inherit;background:transparent}
.tw-opt:hover,.tw-opt.on{opacity:1;border-color:var(--c1);box-shadow:0 0 8px var(--glow)}

#glitch{position:absolute;inset:0;z-index:200;pointer-events:none;opacity:0}
#notif{position:absolute;top:44px;right:12px;z-index:40;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.ni{background:rgba(0,0,0,.95);border:1px solid var(--border);border-left:2px solid var(--c1);padding:7px 11px;font-size:9px;color:var(--c1);letter-spacing:1px;opacity:0;transform:translateX(20px);transition:all .3s;min-width:190px;max-width:230px}
.ni.show{opacity:1;transform:translateX(0)}
</style>
</head>

<script>
const L={devlens_gh:'https://github.com/eshitalopes10/devlens-ai',devlens_demo:'https://devlens-ai-umber.vercel.app/',codesnap_gh:'https://github.com/eshitalopes10/codesnap',codesnap_demo:'https://codesnap-sable.vercel.app/',stock_gh:'https://github.com/eshitalopes10',certs:'https://drive.google.com/drive/folders/1G3PVx4cZ1HvZekjxstHF8F9XZ7WSS9IS?usp=sharing',linkedin:'https://linkedin.com/in/eshita-lopes-9745452a3',email:'mailto:eshitalopes@gmail.com',phone:'tel:+917028126650'};

const AC=new(window.AudioContext||window.webkitAudioContext)();
let sfxOn=true;
function toggleSfx(){sfxOn=!sfxOn;document.getElementById('sfxbtn').textContent='SFX '+(sfxOn?'ON':'OFF');}
function p(f,d,v=.07,tp='sine',sw=0){if(!sfxOn)return;try{const o=AC.createOscillator(),g=AC.createGain(),fl=AC.createBiquadFilter();fl.type='lowpass';fl.frequency.value=3000;o.connect(fl);fl.connect(g);g.connect(AC.destination);o.type=tp;o.frequency.setValueAtTime(f,AC.currentTime);if(sw)o.frequency.exponentialRampToValueAtTime(sw,AC.currentTime+d);g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d+.02);}catch(e){}}

const SND={
  terminal:{open:()=>{p(80,.15,.1,'sawtooth');setTimeout(()=>p(160,.1,.07,'sawtooth'),80);setTimeout(()=>p(320,.2,.09,'square'),160);setTimeout(()=>p(640,.15,.06,'square'),280);},close:()=>p(320,.08,.06,'square',80),type:()=>p(220+Math.random()*120,.018,.028,'square')},
  files:{open:()=>{p(200,.12,.07,'triangle',400);setTimeout(()=>{for(let i=0;i<5;i++)setTimeout(()=>p(300+i*60,.04,.03,'triangle'),i*30)},120);},close:()=>p(400,.1,.06,'triangle',200)},
  about:{open:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>p(f,.25,.07,'sine'),i*80));},close:()=>p(523,.1,.05,'sine',400)},
  skills:{open:()=>{[110,220,440,880,1760].forEach((f,i)=>setTimeout(()=>p(f,.08,.07,'sawtooth'),i*60));},close:()=>p(880,.08,.05,'sawtooth',220),skillPop:(i)=>p(261+[0,37,70,110,147,175,207,277][i%8],.12,.06,'sine')},
  projects:{open:()=>{p(60,.3,.12,'sawtooth');setTimeout(()=>{p(440,.1,.08,'square');p(554,.1,.05,'square');p(659,.12,.07,'square');},280);},close:()=>p(440,.06,.06,'square',220)},
  experience:{open:()=>{for(let i=0;i<8;i++)setTimeout(()=>p(180+i*20,.03,.05,'square'),i*35);setTimeout(()=>p(400,.15,.06,'triangle'),300);},close:()=>{for(let i=0;i<3;i++)setTimeout(()=>p(300-i*40,.03,.04,'square'),i*30);}},
  certs:{open:()=>{[261,330,392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>p(f,.18,.07,'sine'),i*55));},close:()=>p(784,.1,.05,'sine',392)},
  contact:{open:()=>{const m=[1,0,1,1,0,1,0,1];let t=0;m.forEach(b=>{if(b)setTimeout(()=>p(800,.08,.09,'sine'),t);t+=120;});},close:()=>p(800,.12,.06,'sine',400)},
  settings:{open:()=>{p(600,.05,.06,'square');setTimeout(()=>p(900,.04,.05,'square'),60);},close:()=>p(900,.04,.05,'square',600)},
  notify:()=>{p(880,.05,.05,'sine');setTimeout(()=>p(1100,.07,.05,'sine'),60);},
  glitch:()=>{for(let i=0;i<4;i++)setTimeout(()=>p(80+Math.random()*200,.04,.05,'sawtooth'),i*25);},
  boot:(i)=>p(110*Math.pow(1.15,i),.08,.07,'sawtooth'),
  ok:()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>p(f,.18,.07,'sine'),i*55)),
  err:()=>p(160,.25,.1,'sawtooth',80),
  ls:()=>[261,294,330,349,392].forEach((f,i)=>setTimeout(()=>p(f,.06,.04,'triangle'),i*40)),
  swoosh:()=>p(600,.15,.06,'sine',200),
};

// WALLPAPER
const wc=document.getElementById('wc'),wx=wc.getContext('2d');
let wt=0,wpMode='matrix',mdrops=[],stars=[],circuits=[];
function initWall(){
  wc.width=wc.offsetWidth||800;wc.height=wc.offsetHeight||560;
  mdrops=Array(Math.floor(wc.width/14)).fill(0).map(()=>Math.random()*-60);
  stars=Array(120).fill(0).map(()=>({x:Math.random()*wc.width,y:Math.random()*wc.height,r:Math.random()*1.5+.3,s:Math.random()*.5+.1,b:Math.random()}));
  circuits=Array(18).fill(0).map(genCircuit);
}
function genCircuit(){
  const x=Math.random()*800,y=Math.random()*560;const segs=[];let cx=x,cy=y;
  for(let i=0;i<6+Math.floor(Math.random()*6);i++){const d=Math.floor(Math.random()*4),l=20+Math.floor(Math.random()*60);const nx=cx+(d===0?l:d===1?-l:0),ny=cy+(d===2?l:d===3?-l:0);segs.push({x1:cx,y1:cy,x2:nx,y2:ny});cx=nx;cy=ny;}
  return{segs,prog:0,speed:.008+Math.random()*.012};
}

const MC='01アイウエオカキクケコ<>{}[]();=+-*/eshita0123456789';
function getC(a=1){const s=getComputedStyle(document.getElementById('os')).getPropertyValue('--c1').trim()||'#00ff88';const m=s.match(/^#([0-9a-f]{6})$/i);if(m){const r=parseInt(m[1].slice(0,2),16),g=parseInt(m[1].slice(2,4),16),b=parseInt(m[1].slice(4,6),16);return`rgba(${r},${g},${b},${a})`;}return`rgba(0,255,136,${a})`;}
function drawWall(){
  wt+=.006;const col=getC;
  if(wpMode==='matrix'){
    wx.fillStyle='rgba(0,0,0,0.055)';wx.fillRect(0,0,wc.width,wc.height);
    mdrops.forEach((y,i)=>{const ch=MC[Math.floor(Math.random()*MC.length)],br=Math.random()>.94;wx.fillStyle=br?'#ccffdd':col(br?.7:.28);wx.font=(br?'bold ':'')+'12px JetBrains Mono,monospace';wx.fillText(ch,i*14,y*14);if(y*14>wc.height&&Math.random()>.975)mdrops[i]=0;mdrops[i]+=.45;});

    for(let r=0;r<rs;r++)for(let c=0;c<cs;c++){const cx=c*R*1.73+(r%2)*R*.865,cy=r*R*1.5,d=Math.sqrt((cx-wc.width/2)**2+(cy-wc.height/2)**2),wave=Math.sin(d*.013-wt*1.2)*Math.cos(d*.007+wt*.5),al=Math.max(0,wave*.5+.04);wx.beginPath();for(let a=0;a<6;a++){const ax=cx+R*.88*Math.cos(a*Math.PI/3),ay=cy+R*.88*Math.sin(a*Math.PI/3);a===0?wx.moveTo(ax,ay):wx.lineTo(ax,ay);}wx.closePath();wx.strokeStyle=col(al);wx.lineWidth=.6;wx.stroke();if(al>.3){wx.fillStyle=col(al*.12);wx.fill();}}
  } else if(wpMode==='circuit'){

    for(let y=0;y<wc.height;y+=40){wx.beginPath();wx.moveTo(0,y);wx.lineTo(wc.width,y);wx.stroke();}
    circuits.forEach(ct=>{ct.prog+=ct.speed;const total=ct.segs.length;ct.segs.forEach((s,i)=>{if(i>ct.prog)return;const f=i<Math.floor(ct.prog)?1:ct.prog-Math.floor(ct.prog);wx.strokeStyle=col(.5);wx.lineWidth=1.2;wx.beginPath();wx.moveTo(s.x1,s.y1);wx.lineTo(s.x1+(s.x2-s.x1)*f,s.y1+(s.y2-s.y1)*f);wx.stroke();wx.fillStyle=col(.8);wx.beginPath();wx.arc(s.x1,s.y1,2,0,Math.PI*2);wx.fill();});if(ct.prog>total+1){Object.assign(ct,genCircuit());ct.prog=0;}});
  } else if(wpMode==='stars'){

    const grd=wx.createRadialGradient(wc.width*.5,wc.height*.5,0,wc.width*.5,wc.height*.5,wc.width*.6);grd.addColorStop(0,col(.06));grd.addColorStop(1,'transparent');wx.fillStyle=grd;wx.fillRect(0,0,wc.width,wc.height);

    if(Math.random()>.998){wx.strokeStyle=col(.8);wx.lineWidth=1.5;const sx=Math.random()*wc.width,sy=Math.random()*wc.height*.5;wx.beginPath();wx.moveTo(sx,sy);wx.lineTo(sx+60,sy+20);wx.stroke();}
  }
}

let zTop=10;const wins={};

// Window spawn positions — staggered so they open side by side and don't fully overlap
let winStack=0;
function nextPos(w,h){
  const os=document.getElementById('os');
  const W=os.offsetWidth||800,H=os.offsetHeight||640;
  const taskH=36,dockH=40;
  const avW=W-w,avH=H-taskH-dockH-h;
  // cascade: offset each new window slightly
  const offset=(winStack%5)*28;
  const x=Math.max(0,Math.min(avW, Math.floor(W/2-w/2)+offset));
  const y=Math.max(taskH,Math.min(taskH+avH, taskH+40+offset));
  winStack++;
  return{x,y};
}

function makeWin(id,title,w,h,x,y,body){
  if(wins[id]){bringFront(id);return null;}
  const ak=Object.keys(ASND).find(k=>id===k||id.startsWith(k));
  if(ak&&ASND[ak]?.open)ASND[ak].open();else SND.settings.open();
  const el=document.createElement('div');el.className='win';el.id='win-'+id;
  el.style.cssText=`width:${w}px;height:${h}px;left:${x}px;top:${y}px;z-index:${++zTop}`;
  el.innerHTML=`<div class="win-bar" onmousedown="startDrag(event,'${id}')"><div class="wd r" onclick="closeWin('${id}')"></div><div class="wd y" onclick="minWin('${id}')"></div><div class="wd g" onclick="maxWin('${id}')"></div><div class="win-title">${title}</div></div><div class="win-body" id="wb-${id}">${body}</div>`;
  document.getElementById('desktop').appendChild(el);
  wins[id]={el,x,y,w,h,min:false,max:false,ox:x,oy:y,ow:w,oh:h};
  el.addEventListener('mousedown',()=>bringFront(id));
  notify('Opened: '+title);return el;
}
function closeWin(id){const ak=Object.keys(ASND).find(k=>id===k||id.startsWith(k));if(ak&&ASND[ak]?.close)ASND[ak].close();doGlitch();const el=document.getElementById('win-'+id);if(el){el.style.transition='opacity .2s,transform .2s';el.style.opacity='0';el.style.transform='scale(.95)';setTimeout(()=>{el.remove();delete wins[id];winStack=Math.max(0,winStack-1);},220);}}
function minWin(id){SND.swoosh();const el=document.getElementById('win-'+id);if(!el)return;const s=wins[id];if(!s.min){el.style.transition='all .2s';el.style.transform='scale(.05)';el.style.opacity='0';s.min=true;}else{el.style.transform='scale(1)';el.style.opacity='1';s.min=false;bringFront(id);}}
function maxWin(id){const el=document.getElementById('win-'+id);if(!el)return;const s=wins[id];SND.swoosh();el.style.transition='all .2s';if(!s.max){el.style.left='0';el.style.top='36px';el.style.width='100%';el.style.height='calc(100% - 76px)';s.max=true;}else{el.style.left=s.ox+'px';el.style.top=s.oy+'px';el.style.width=s.ow+'px';el.style.height=s.oh+'px';s.max=false;}setTimeout(()=>el.style.transition='',220);}
function bringFront(id){const el=document.getElementById('win-'+id);if(el)el.style.zIndex=++zTop;}

// DRAG
let drag=null,dox=0,doy=0;
function startDrag(e,id){if(e.target.classList.contains('wd'))return;drag=id;const r=document.getElementById('win-'+id).getBoundingClientRect();dox=e.clientX-r.left;doy=e.clientY-r.top;document.addEventListener('mousemove',onDrag);document.addEventListener('mouseup',stopDrag);}
function onDrag(e){if(!drag)return;const el=document.getElementById('win-'+drag);if(!el)return;const os=document.getElementById('os').getBoundingClientRect();el.style.left=Math.max(0,e.clientX-os.left-dox)+'px';el.style.top=Math.max(36,e.clientY-os.top-doy)+'px';}
function stopDrag(){drag=null;document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',stopDrag);}

function openContact(){
  const pos=nextPos(330,360);
  const html=`<div class="vb"><div class="vtitle">UPLINK.EXE</div><div class="vsub">// ENCRYPTED CHANNEL — OPEN</div><div class="cfrow"><span class="cflbl">root:~$ NAME</span><input class="cfinp" id="cf-n" placeholder="identify yourself..."></div><div class="cfrow"><span class="cflbl">root:~$ EMAIL</span><input class="cfinp" id="cf-e" placeholder="your frequency..."></div><div class="cfrow"><span class="cflbl">root:~$ MSG</span><input class="cfinp" id="cf-m" placeholder="transmit payload..."></div><button class="cfsend" onclick="cfSend()">[ TRANSMIT ]</button><div style="font-size:9px;color:var(--c2);margin-top:8px;min-height:12px;letter-spacing:2px" id="cf-s"></div><div style="margin-top:12px;border-top:1px solid var(--border);padding-top:11px;display:flex;gap:6px;flex-wrap:wrap"><a href="${L.email}" class="vlink g">[ ✉ email ]</a><a href="${L.linkedin}" target="_blank" class="vlink">[ ↗ linkedin ]</a><a href="${L.phone}" class="vlink g">[ ☎ call ]</a></div></div>`;
  makeWin('contact','uplink.exe',330,360,pos.x,pos.y,html);

function cfSend(){const n=document.getElementById('cf-n')?.value,st=document.getElementById('cf-s');if(!st)return;if(!n){st.textContent='// ERR: identification required';st.style.color='#f44';SND.err();return;}let d=0;st.style.color='var(--c2)';const iv=setInterval(()=>{st.textContent='// ENCRYPTING'+'.'.repeat(d++%4);SND.terminal.type();},220);setTimeout(()=>{clearInterval(iv);st.textContent='// ✓ UPLINK CONFIRMED';st.style.color='var(--c1)';SND.ok();doGlitch();},2400);}

document.getElementById('os').addEventListener('dblclick',e=>{if(['os','wallpaper','wc'].includes(e.target.id))openTerminal();});
